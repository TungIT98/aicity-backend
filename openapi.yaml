{
  "openapi": "3.1.0",
  "info": {
    "title": "AI City API",
    "description": "\n## AI City Backend API\n\nAI City is an AI Agent Platform for Vietnamese SMEs.\n\n### Features\n- [Auth] JWT-based user authentication\n- [Analytics] Real-time analytics with Matomo integration\n- [Leads] CRM lead management and conversion tracking\n- [Invoices] Vietnamese e-invoice support\n- [Revenue] Subscription and payment tracking\n- [Search] RAG-powered semantic search\n\n### API Versions\n| Version | Base URL | Status |\n|---------|----------|--------|\n| v1 | `/v1/` | Stable |\n| Unversioned | `/` | Stable (backward compatible) |\n\nSee API_VERSIONING.md for versioning strategy details.\n\n### Authentication\nAll protected endpoints require a Bearer token:\n```\nAuthorization: Bearer <your_token>\n```\n\n### Rate Limits\n| Tier | Requests | Window |\n|------|----------|--------|\n| Default | 1000 | 1 minute |\n| Auth | 20 | 1 minute |\n| Search | 100 | 1 minute |\n| Write | 200 | 1 minute |\n\nResponse headers on every request:\n- X-RateLimit-Limit - Max requests allowed\n- X-RateLimit-Remaining - Remaining requests in window\n- X-RateLimit-Reset - Unix timestamp when limit resets\n\n### Error Response Format\nAll errors follow a consistent format:\n```json\n{\n  \"error\": {\n    \"code\": 400,\n    \"message\": \"Bad Request - Invalid input\",\n    \"type\": \"ValidationError\"\n  },\n  \"request_id\": \"abc-123\"\n}\n```\n\n### Error Codes\n| Code | Type | Description |\n|------|------|-------------|\n| 400 | ValidationError | Invalid request parameters |\n| 401 | AuthenticationError | Missing or invalid Bearer token |\n| 403 | ForbiddenError | Insufficient permissions |\n| 404 | NotFoundError | Resource not found |\n| 409 | ConflictError | Resource already exists |\n| 422 | UnprocessableEntity | Request body validation failed |\n| 429 | TooManyRequests | Rate limit exceeded |\n| 500 | InternalServerError | Unexpected server error |\n| 503 | ServiceUnavailable | Downstream service unavailable |\n\n### Support\nEmail: support@aicity.vn\n\nAPI Version: 1.0.0\n",
    "contact": {
      "name": "AI City Support",
      "url": "https://aicity.vn/",
      "email": "support@aicity.vn"
    },
    "license": {
      "name": "Proprietary",
      "url": "https://aicity.vn/terms"
    },
    "version": "1.0.0"
  },
