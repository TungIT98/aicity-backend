version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aicity_postgres
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
    environment:
      POSTGRES_USER: aicity
      POSTGRES_PASSWORD: aicity_secure_2024
      POSTGRES_DB: aicity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicity"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aicity_qdrant
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/dreadyz"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  matomo:
    image: matomo:latest
    container_name: aicity_matomo
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    depends_on:
      - postgres
    environment:
      MATOMO_DATABASE_ADAPTER: PDO_PGSQL
      MATOMO_DATABASE_HOST: postgres
      MATOMO_DATABASE_PORT: 5432
      MATOMO_DATABASE_USERNAME: aicity
      MATOMO_DATABASE_PASSWORD: aicity_secure_2024
      MATOMO_DATABASE_NAME: matomo
      MATOMO_DATABASE_PREFIX: matomo_
    ports:
      - "8080:80"
    volumes:
      - matomo_data:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  qdrant_data:
  matomo_data:
